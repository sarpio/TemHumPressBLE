<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarpioWeather</title>
    <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>

<div class="page">
    <div class="topbar">
        <div>
            <h1>SarpioWeather</h1>
            <div id="connectionStatus">Rozłączony</div>
        </div>
        <button id="connectButton" type="button">Połącz</button>
    </div>

    <div class="readings">
        <div class="reading reading-temperature">
            <div class="label">Temperatura:</div>
            <div class="value"><span id="temperatureValue">--</span><span class="unit">°C</span></div>
        </div>
        <div class="reading reading-humidity">
            <div class="label">Wilgotność:</div>
            <div class="value"><span id="humidityValue">--</span><span class="unit">%</span></div>
        </div>
        <div class="reading reading-pressure">
            <div class="label">Ciśnienie:</div>
            <div class="value"><span id="pressureValue">--</span><span class="unit">hPa</span></div>
        </div>
        <div class="reading reading-battery">
            <div class="label">Bateria:</div>
            <div class="value"><span id="batteryValue">--</span><span class="unit">%</span></div>
            <div id="batteryVoltage" class="detail">-- V</div>
        </div>
    </div>

    <div id="lastRead" class="last-read">Brak odczytu</div>
</div>

<script src="js/script.js?v=3"></script>

</body>
</html>
