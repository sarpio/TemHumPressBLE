<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarpioWeather</title>
    <link rel="stylesheet" href="css/style.css?v=102">
</head>
<body>

<main class="app">
    <header class="header">
        <div>
            <h1>SarpioWeather</h1>
            <div id="connectionStatus" class="status">Rozłączony</div>
        </div>
        <button id="connectButton" class="connect-button" type="button">Połącz</button>
    </header>

    <section class="readings" aria-label="Odczyty pogody">
        <div class="reading reading-temperature">
            <div class="reading-label">Temperatura:</div>
            <div class="reading-value"><span id="temperatureValue">--</span> °C</div>
        </div>
        <div class="reading reading-humidity">
            <div class="reading-label">Wilgotność:</div>
            <div class="reading-value"><span id="humidityValue">--</span> %</div>
        </div>
        <div class="reading reading-pressure">
            <div class="reading-label">Ciśnienie:</div>
            <div class="reading-value"><span id="pressureValue">--</span> hPa</div>
        </div>
        <div class="reading reading-battery">
            <div class="reading-label">Bateria:</div>
            <div class="reading-value"><span id="batteryValue">--</span>% / <span id="batteryVoltage">--V</span></div>
        </div>
    </section>

    <div id="lastRead" class="last-read">Brak odczytu</div>
</main>

<footer class="screen-width">
    Szerokość ekranu: <span id="screenWidthValue">--</span> px
</footer>

<script src="js/script.js?v=103"></script>

</body>
</html>
