<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarpioWeather</title>
    <link rel="stylesheet" href="css/style.css?v=100">
</head>
<body>

<main class="app">
    <header class="header">
        <div>
            <h1>SarpioWeather</h1>
            <div id="connectionStatus" class="status">Rozłączony</div>
        </div>
        <button id="connectButton" class="connect-button" type="button">Połącz</button>
    </header>

    <section class="readings" aria-label="Odczyty pogody">
        <div class="reading reading-temperature">
            <span class="reading-label">Temperatura:</span>
            <span class="reading-value"><span id="temperatureValue">--</span> °C</span>
        </div>
        <div class="reading reading-humidity">
            <span class="reading-label">Wilgotność:</span>
            <span class="reading-value"><span id="humidityValue">--</span> %</span>
        </div>
        <div class="reading reading-pressure">
            <span class="reading-label">Ciśnienie:</span>
            <span class="reading-value"><span id="pressureValue">--</span> hPa</span>
        </div>
        <div class="reading reading-battery">
            <span class="reading-label">Bateria:</span>
            <span class="reading-value"><span id="batteryValue">--</span> % <span id="batteryValue">-- V</span></span>
        </div>
    </section>

    <div id="lastRead" class="last-read">Brak odczytu</div>
</main>

<script src="js/script.js?v=100"></script>

</body>
</html>
